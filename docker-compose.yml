version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: student-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongodb_data:/data/db
    networks:
      - student-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: student-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MONGO_URI: mongodb://admin:password123@mongodb:27017/student-management?authSource=admin
      JWT_SECRET: your-secret-key-change-in-production
      FRONTEND_URL: http://localhost
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    depends_on:
      - mongodb
    volumes:
      - ./src:/app/src
      - /app/node_modules
    networks:
      - student-network

  # Frontend (React + Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: student-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      VITE_API_BASE_URL: http://localhost:3001/api
      VITE_SOCKET_URL: http://localhost:3001
    depends_on:
      - backend
    networks:
      - student-network

volumes:
  mongodb_data:

networks:
  student-network:
    driver: bridge
